   <body>
     <header>
        <h1 class="top"> Course Organizer </h1>
        <nav>
            <ul style ="list-style-type :square ;">
                <li><a href="home.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
     </header>
    <section>
     <h2>Add a New Course</h2>
     <form>
        <div>
            <label for="cname">Course Name:</label><br>
            <input type="text" id="cname" name="course_name" required>
        </div><br>

        <div>
            <label for="instructor">Instructor:</label><br>
            <input type="text" id="instructor" name="instructor_name" required>
        </div><br>

        <div>
            <label for="hours">Credit Hours:</label><br>
            <input type="number" id="hours" name="credit_hours" min="1" max="5" required>
        </div><br>

        <div>
            <label for="notes">Notes:</label><br>
            <textarea id="notes" name="notes" rows="4" cols="30"></textarea>
        </div><br>

        <button type="submit">Add Course</button>
        <button type="reset">Clear Form</button>
     </form>
   </section>
   </body>
   <footer>
